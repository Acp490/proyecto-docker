<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" th:href="@{/CSS/navbar.css}" />
    <link rel="stylesheet" th:href="@{/CSS/login.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .password-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .password-wrapper input {
            padding-right: 40px !important;
            width: 100%;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none !important;
            border: none !important;
            cursor: pointer;
            font-size: 16px;
            color: #999 !important;
        }
    </style>
</head>

<body class="registro-page"
      th:style="'background: url(' + @{/IMG/fondoregistro.jpg} + ') no-repeat center/cover; padding-top:0px'">

<div th:replace="plantilla/navbar :: navbar"></div>

<div class="registro-container">

    <div class="registro-left"></div>

    <div th:if="${param.registro}" class="alert alert-success">
        Usuario registrado con éxito. ¡Inicia sesión!
    </div>

    <div class="registro-right" style="background-color:black">

        <form th:action="@{/registro}" method="POST" id="formRegistro">
            <h2 class="text-white text-2xl font-bold mb-6 text-center">REGISTRO USUARIO</h2>

            <!-- Nombre y Apellido -->
            <div class="flex gap-4 mb-4">
                <div class="w-1/2">
                    <label class="block text-white">Nombre</label>
                    <input type="text" name="nombreUsuario" pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]{1,50}"
                           class="w-full mt-1 p-2 bg-gray-800 text-white border border-green-500 rounded"
                           placeholder="Miguel" required>
                </div>

                <div class="w-1/2">
                    <label class="block text-white">Apellido</label>
                    <input type="text" name="apellidoUsuario" pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]{1,50}"
                           class="w-full mt-1 p-2 bg-gray-800 text-white border border-green-500 rounded"
                           placeholder="Arevalo" required>
                </div>
            </div>

            <!-- Teléfono -->
            <div class="mb-4">
                <label class="block text-white">Teléfono</label>
                <input type="text" name="telefono" pattern="[0-9]{10}"
                       class="w-full mt-1 p-2 bg-gray-800 text-white border border-green-500 rounded"
                       placeholder="3000000000" required>
            </div>

            <!-- Correo -->
            <div class="mb-4">
                <label class="block text-white">Correo Electrónico</label>
                <input type="email" name="correo"
                       class="w-full mt-1 p-2 bg-gray-800 text-white border border-green-500 rounded"
                       placeholder="micorreo@gmail.com" required>
            </div>

            <!-- Contraseña -->
            <div class="mb-6">
                <label class="block text-white">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" name="contrasena" id="passwordRegistro"
                           minlength="6" class="w-full mt-1 p-2 bg-gray-800 text-white border border-green-500 rounded"
                           placeholder="Contraseña321." required>

                    <button type="button" class="toggle-password" id="togglePasswordRegistro">
                        <i class="fas fa-eye" id="eyeIconRegistro"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded">
                Registrarse
            </button>

            <p class="text-white text-sm mt-4 text-center">
                ¿Ya tienes una cuenta?
                <a th:href="@{/login}" class="text-blue-400 hover:underline">Inicia sesión</a>
            </p>

        </form>
    </div>
</div>

<script>
    // Script del toggle de contraseña
    document.addEventListener('DOMContentLoaded', function() {
        const passwordInput = document.getElementById('passwordRegistro');
        const toggleButton = document.getElementById('togglePasswordRegistro');
        const eyeIcon = document.getElementById('eyeIconRegistro');

        toggleButton.addEventListener('click', function() {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
            passwordInput.focus();
        });
    });
</script>

</body>
</html>
